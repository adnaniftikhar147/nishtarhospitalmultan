{% extends 'base.html' %}

{% block title %}Change Password | Nishtar Hospital HRMS{% endblock %}

{% block breadcrumb %}
Account / <span class="highlight">Change Password</span>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 32px auto; padding: 32px;">
    <div style="text-align: center; margin-bottom: 24px;">
        <i class='bx bxs-key' style="font-size: 48px; color: var(--primary); margin-bottom: 12px;"></i>
        <h2>Change Password</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">Update your admin portal password</p>
    </div>

    <form method="POST" action="{{ url_for('change_password') }}">
        <div class="form-group" style="margin-bottom: 20px;">
            <label
                style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); text-transform: uppercase;">Current
                Password</label>
            <div style="position: relative;">
                <input type="password" name="current_password" required placeholder="Enter current password"
                    style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 15px; font-family: inherit;">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label
                style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); text-transform: uppercase;">New
                Password</label>
            <div style="position: relative;">
                <input type="password" name="new_password" required placeholder="Enter new password (min. 8 chars)"
                    style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 15px; font-family: inherit;">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label
                style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); text-transform: uppercase;">Confirm
                New Password</label>
            <div style="position: relative;">
                <input type="password" name="confirm_password" required placeholder="Retype new password"
                    style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 15px; font-family: inherit;">
            </div>
        </div>

        <button type="submit" class="btn-primary"
            style="width: 100%; justify-content: center; padding: 14px; font-size: 16px;">
            Update Password
        </button>
    </form>
</div>
{% endblock %}
