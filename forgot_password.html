<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery - Nishtar Hospital HRMS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-md: 10px;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: var(--bg-card);
            padding: 48px 40px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo i {
            font-size: 32px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }

        .btn-login {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-login:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        .alert {
            font-size: 14px;
            margin-bottom: 24px;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: left;
        }

        .alert-error {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background-color: #dcfce7;
            color: #16a34a;
            border: 1px solid #86efac;
        }

        .auth-link {
            margin-top: 24px;
            display: block;
            font-size: 14px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">
            <i class='bx bx-key'></i>
            <span>Recovery Portal</span>
        </div>
        <p class="subtitle" id="form-subtitle">Recover your account securely</p>

        <!-- Dynamic Alert Box -->
        <div id="alert-box" class="alert hidden"></div>

        <!-- Step 1: Request OTP -->
        <div id="step-1">
            <div class="form-group">
                <label>Registered Username or E-mail</label>
                <div class="input-icon-wrapper">
                    <i class='bx bxs-user'></i>
                    <input type="text" id="username_input" placeholder="e.g. admin or admin@nishtar.com" required
                        autocomplete="off">
                </div>
            </div>
            <button onclick="requestOTP()" class="btn-login" id="btn-otp">
                <i class='bx bx-envelope'></i> Send OTP
            </button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step-2" class="hidden">
            <div class="form-group">
                <label>Enter 6-Digit OTP</label>
                <div class="input-icon-wrapper">
                    <i class='bx bx-dialpad-alt'></i>
                    <input type="text" id="otp_input" placeholder="123456" maxlength="6"
                        style="text-align:center; letter-spacing:2px;">
                </div>
            </div>
            <button onclick="verifyOTP()" class="btn-login" id="btn-verify">
                <i class='bx bx-check'></i> Verify OTP
            </button>
        </div>

        <!-- Step 3: Reset Password -->
        <div id="step-3" class="hidden">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-icon-wrapper">
                    <i class='bx bxs-lock-alt'></i>
                    <input type="password" id="new_password" placeholder="Min 8 characters"
                        style="padding-right: 42px;">
                    <i class='bx bx-show togglePassword' onclick="togglePwd('new_password', this)"
                        style="position: absolute; right: 14px; top:50%; transform:translateY(-50%); cursor: pointer; color:#64748b; left:auto;"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-icon-wrapper">
                    <i class='bx bx-check-shield'></i>
                    <input type="password" id="confirm_password" placeholder="Re-enter password"
                        style="padding-right: 42px;">
                    <i class='bx bx-show togglePassword' onclick="togglePwd('confirm_password', this)"
                        style="position: absolute; right: 14px; top:50%; transform:translateY(-50%); cursor: pointer; color:#64748b; left:auto;"></i>
                </div>
            </div>
            <button onclick="resetPassword()" class="btn-login" id="btn-reset">
                <i class='bx bx-save'></i> Save Password
            </button>
        </div>

        <a href="/login" class="auth-link"><i class='bx bx-arrow-back'></i> Return to Login</a>
    </div>

    <!-- JavaScript Logic (SPA flow with Fetch API) -->
    <script>
        let currentUsername = "";
        let currentOtp = "";

        function showAlert(msg, isError) {
            const box = document.getElementById('alert-box');
            box.classList.remove('hidden', 'alert-error', 'alert-success');
            box.classList.add(isError ? 'alert-error' : 'alert-success');
            box.innerHTML = isError ? `<i class='bx bxs-error-circle'></i> ${msg}` : `<i class='bx bxs-check-circle'></i> ${msg}`;
        }

        function hideAlert() {
            document.getElementById('alert-box').classList.add('hidden');
        }

        async function requestOTP() {
            const username = document.getElementById('username_input').value.trim();
            if (!username) {
                showAlert("Please enter your Username or E-mail.", true);
                return;
            }
            hideAlert();

            const btn = document.getElementById('btn-otp');
            btn.innerHTML = "<i class='bx bx-loader bx-spin'></i> Processing...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const data = await res.json();

                if (!data.success) {
                    // Step 1 check failure - As requested: 'Username or E-mail does not exist...'
                    showAlert(data.message, true);
                } else {
                    // Step 2 success
                    currentUsername = username;
                    showAlert(data.message, false);
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    document.getElementById('form-subtitle').innerText = "Authentication Code";

                    // Temporary Development popup
                    if (data.temp_otp) {
                        alert("TESTING MODE: Your 6-digit OTP is: " + data.temp_otp);
                    }
                }
            } catch (err) {
                showAlert("Communication error.", true);
            }
            btn.innerHTML = "<i class='bx bx-envelope'></i> Send OTP";
            btn.disabled = false;
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp_input').value.trim();
            if (otp.length < 6) {
                showAlert("Please enter a valid 6-digit OTP.", true);
                return;
            }
            hideAlert();

            const btn = document.getElementById('btn-verify');
            btn.innerHTML = "<i class='bx bx-loader bx-spin'></i> Verifying...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUsername, otp: otp })
                });
                const data = await res.json();

                if (!data.success) {
                    showAlert(data.message, true);
                } else {
                    currentOtp = otp;
                    showAlert(data.message, false);
                    document.getElementById('step-2').classList.add('hidden'); // Hide OTP field
                    document.getElementById('step-3').classList.remove('hidden'); // Show Password fields
                    document.getElementById('form-subtitle').innerText = "Set New Password";
                }
            } catch (err) {
                showAlert("Communication error.", true);
            }
            btn.innerHTML = "<i class='bx bx-check'></i> Verify OTP";
            btn.disabled = false;
        }

        async function resetPassword() {
            const pwd1 = document.getElementById('new_password').value;
            const pwd2 = document.getElementById('confirm_password').value;

            if (pwd1.length < 8) {
                showAlert("Password must be at least 8 characters.", true);
                return;
            }
            if (pwd1 !== pwd2) {
                showAlert("Passwords do not match.", true);
                return;
            }

            hideAlert();
            const btn = document.getElementById('btn-reset');
            btn.innerHTML = "<i class='bx bx-loader bx-spin'></i> Saving...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: currentUsername, otp: currentOtp, new_password: pwd1 })
                });
                const data = await res.json();

                if (!data.success) {
                    showAlert(data.message, true);
                    btn.innerHTML = "<i class='bx bx-save'></i> Save Password";
                    btn.disabled = false;
                } else {
                    showAlert(data.message, false);
                    document.getElementById('step-3').innerHTML = `<p style="color:var(--text-muted); padding: 20px 0;">Your password has been reset securely. Redirecting to login...</p>`;
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2000);
                }
            } catch (err) {
                showAlert("Communication error.", true);
                btn.innerHTML = "<i class='bx bx-save'></i> Save Password";
                btn.disabled = false;
            }
        }

        function togglePwd(id, icon) {
            const el = document.getElementById(id);
            if (el.type === 'password') {
                el.type = 'text';
                icon.classList.replace('bx-show', 'bx-hide');
            } else {
                el.type = 'password';
                icon.classList.replace('bx-hide', 'bx-show');
            }
        }
    </script>
</body>

</html>
